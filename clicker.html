<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMMu Tapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { user-select: none; -webkit-tap-highlight-color: transparent; background: radial-gradient(circle at center, #1f1a3a 0%, #0d0b18 100%); }
        .coin-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-white h-screen flex flex-col justify-between p-6 overflow-hidden">

    <div class="flex flex-col items-center mt-8">
        <div class="flex items-center gap-2 bg-black/30 px-4 py-2 rounded-full border border-yellow-500/20">
            <i data-lucide="coins" class="w-6 h-6 text-yellow-400"></i>
            <span class="text-xs font-semibold uppercase tracking-wider text-yellow-400/80">Баланс</span>
        </div>
        <h1 id="score" class="text-5xl font-black mt-3 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500">0</h1>
    </div>

    <div class="flex justify-center items-center my-auto relative">
        <div class="absolute w-72 h-72 bg-yellow-500/10 rounded-full blur-3xl"></div>
        <div id="coin" class="w-64 h-64 rounded-full bg-gradient-to-b from-yellow-300 via-yellow-500 to-amber-600 p-3 shadow-[0_0_50px_rgba(245,158,11,0.4)] cursor-pointer transition-transform duration-75 coin-active flex items-center justify-center relative z-10">
            <div class="w-full h-full rounded-full bg-gradient-to-t from-amber-500 to-yellow-400 border-4 border-yellow-200/50 flex items-center justify-center shadow-inner">
                <span class="text-6xl font-black text-amber-950">C</span>
            </div>
        </div>
    </div>

    <div class="w-full max-w-sm mx-auto mb-6 bg-black/40 p-4 rounded-2xl border border-white/5">
        <div class="flex justify-between text-sm font-medium mb-2 px-1">
            <div class="flex items-center gap-1.5 text-cyan-400"><i data-lucide="zap" class="w-4 h-4 fill-cyan-400"></i><span>Энергия</span></div>
            <span id="energy-text" class="font-bold">100/100</span>
        </div>
        <div class="w-full h-3 bg-white/10 rounded-full overflow-hidden p-[2px]">
            <div id="energy-bar" class="h-full bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full transition-all duration-100" style="width: 100%"></div>
        </div>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.expand(); }
        lucide.createIcons();

        let score = 0; let energy = 100; const maxEnergy = 100;
        const scoreEl = document.getElementById('score');
        const coinEl = document.getElementById('coin');
        const energyBar = document.getElementById('energy-bar');
        const energyText = document.getElementById('energy-text');

        coinEl.addEventListener('pointerdown', (e) => {
            if (energy > 0) {
                score += 1; scoreEl.textContent = score.toLocaleString();
                energy -= 1; updateEnergyUI();
                createFloatingText(e.clientX, e.clientY);
            }
        });

        function createFloatingText(x, y) {
            const text = document.createElement('div');
            text.textContent = '+1';
            text.className = 'absolute text-2xl font-black text-yellow-300 pointer-events-none z-50';
            text.style.left = `${x - 15}px`; text.style.top = `${y - 30}px`; text.style.position = 'fixed';
            document.body.appendChild(text);
            
            let opacity = 1; let currentY = y - 30;
            const animation = setInterval(() => {
                currentY -= 2; opacity -= 0.05;
                text.style.top = `${currentY}px`; text.style.opacity = opacity;
                if (opacity <= 0) { clearInterval(animation); text.remove(); }
            }, 16);
        }

        function updateEnergyUI() {
            const percent = (energy / maxEnergy) * 100;
            energyBar.style.width = `${percent}%`;
            energyText.textContent = `${energy}/${maxEnergy}`;
        }

        setInterval(() => { if (energy < maxEnergy) { energy += 1; updateEnergyUI(); } }, 1000);
    </script>
</body>
</html>
