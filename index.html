<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMMu - Spotify Style</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        ::-webkit-scrollbar { display: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background: #121212;
            color: white;
            padding-bottom: 140px; 
        }
        .gradient-bg { 
            background: linear-gradient(180deg, #1e1e1e 0%, #121212 200px); 
            min-height: 100vh;
        }
        .fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 50;
        }
    </style>
</head>
<body>

    <main class="gradient-bg px-4 pt-4">
        <div class="flex items-center gap-3 mb-6 mt-2">
            <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center font-bold text-black">C</div>
            <button class="bg-[#2a2a2a] px-4 py-1.5 rounded-full text-sm font-medium">Все</button>
            <button class="bg-[#2a2a2a] px-4 py-1.5 rounded-full text-sm font-medium">Музыка</button>
            <button class="bg-[#2a2a2a] px-4 py-1.5 rounded-full text-sm font-medium">Подкасты</button>
        </div>

        <h2 class="text-xl font-bold mb-4">Твоя медиатека</h2>
        <div id="tracks-container" class="flex flex-col gap-3 mb-8">
            <div class="text-[#b3b3b3] text-sm animate-pulse">Загрузка треков из базы напрямую...</div>
        </div>

        <h2 class="text-xl font-bold mb-4">Твои лучшие миксы</h2>
        <div class="flex gap-4 overflow-x-auto pb-4">
            <div class="min-w-[140px] w-[140px]">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=200&q=80" class="w-full h-[140px] object-cover mb-2 rounded" alt="Mix">
                <p class="text-[#b3b3b3] text-xs line-clamp-2">CS2 Hype, Phonk & Bass</p>
            </div>
            <div class="min-w-[140px] w-[140px]">
                <img src="https://images.unsplash.com/photo-1493225457124-a1a2a5f56468?auto=format&fit=crop&w=200&q=80" class="w-full h-[140px] object-cover mb-2 rounded-full" alt="Mix">
                <p class="text-[#b3b3b3] text-xs line-clamp-2 text-center mt-2">Miyagi & Эндшпиль</p>
            </div>
        </div>
    </main>

    <div class="fixed-bottom">
        <div class="px-2 pb-2">
            <div class="bg-[#2a2a2a] rounded-md p-2 flex items-center justify-between shadow-lg relative overflow-hidden cursor-pointer">
                <div class="absolute bottom-0 left-0 h-[2px] bg-white/20 w-full">
                    <div class="h-full bg-white w-[0%]" id="progressBar"></div>
                </div>

                <div class="flex items-center gap-3">
                    <img id="player-cover" src="https://via.placeholder.com/150" class="w-10 h-10 rounded shadow-md object-cover" alt="Track">
                    <div class="flex flex-col w-[150px]">
                        <span id="player-title" class="text-sm font-bold text-white truncate">Загрузка...</span>
                        <span id="player-artist" class="text-[11px] text-[#b3b3b3] truncate">Подождите</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-3 mr-2">
                    <button id="nextBtn" class="text-white"><i data-lucide="skip-forward" class="w-5 h-5 fill-white"></i></button>
                    <button id="playPauseBtn"><i data-lucide="play" class="w-6 h-6 fill-white" id="playIcon"></i></button>
                </div>
            </div>
        </div>

        <nav class="bg-gradient-to-t from-black via-black to-black/90 h-[65px] flex justify-around items-center px-2 pb-2 pt-1">
            <div class="flex flex-col items-center gap-1 cursor-pointer text-white">
                <i data-lucide="house" class="w-6 h-6 fill-white"></i>
                <span class="text-[10px]">Главная</span>
            </div>
            <div class="flex flex-col items-center gap-1 cursor-pointer text-[#b3b3b3] hover:text-white transition">
                <i data-lucide="search" class="w-6 h-6"></i>
                <span class="text-[10px]">Поиск</span>
            </div>
            <div class="flex flex-col items-center gap-1 cursor-pointer text-[#b3b3b3] hover:text-white transition">
                <i data-lucide="library" class="w-6 h-6"></i>
                <span class="text-[10px]">Моя медиатека</span>
            </div>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        const supabaseUrl = 'https://bbxrdhhhdpdthowvocny.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJieHJkaGhoZHBkdGhvd3ZvY255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzcyODIsImV4cCI6MjA5MzcxMzI4Mn0.btUss1h6abeB1OFdI14d5JoGPHmfVxQj9sGOovSwPzI';

        let tracks = [];
        let currentTrackIndex = 0;
        let isPlaying = false;
        const audio = new Audio();

        const playBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const titleEl = document.getElementById('player-title');
        const artistEl = document.getElementById('player-artist');
        const coverEl = document.getElementById('player-cover');
        const tracksContainer = document.getElementById('tracks-container');

        // ПРЯМОЙ ЗАПРОС К БАЗЕ БЕЗ ПОСРЕДНИКОВ
        async function fetchSongs() {
            try {
                const response = await fetch(`${supabaseUrl}/rest/v1/songs?select=*`, {
                    method: 'GET',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`
                    }
                });

                if (!response.ok) throw new Error('Сетевая ошибка связи');

                const data = await response.json();
                tracks = data;
                
                if (tracks.length > 0) {
                    renderTrackList();
                    loadTrack(0); 
                } else {
                    tracksContainer.innerHTML = '<p class="text-[#b3b3b3]">Твоя медиатека пуста.</p>';
                }
            } catch (error) {
                console.error("Ошибка загрузки:", error);
                // Теперь, если блок останется, код не зависнет, а честно напишет об этом красным текстом!
                tracksContainer.innerHTML = '<p class="text-red-500 font-bold">Блокировка сети! Пожалуйста, включите VPN.</p>';
            }
        }

        function renderTrackList() {
            tracksContainer.innerHTML = ''; 
            tracks.forEach((track, index) => {
                const trackHTML = `
                    <div class="flex items-center justify-between cursor-pointer hover:bg-[#2a2a2a] p-2 rounded transition" onclick="playTrack(${index})">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <img src="${track['cover-url'] || track.cover_url || 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded object-cover" alt="cover">
                            <div class="flex flex-col">
                                <span class="font-bold text-sm text-white truncate">${track.title}</span>
                                <span class="text-xs text-[#b3b3b3] truncate">${track.artist}</span>
                            </div>
                        </div>
                        <i data-lucide="more-vertical" class="w-5 h-5 text-[#b3b3b3]"></i>
                    </div>
                `;
                tracksContainer.innerHTML += trackHTML;
            });
            lucide.createIcons(); 
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const track = tracks[index];
            audio.src = track.audio_url;
            titleEl.textContent = track.title;
            artistEl.textContent = track.artist;
            coverEl.src = track['cover-url'] || track.cover_url || 'https://via.placeholder.com/150';
            progressBar.style.width = '0%';
        }

        function playTrack(index) {
            loadTrack(index);
            audio.play();
            isPlaying = true;
            playIcon.setAttribute('data-lucide', 'pause');
            lucide.createIcons();
        }

        playBtn.addEventListener('click', () => {
            if (tracks.length === 0) return; 
            if (isPlaying) {
                audio.pause();
                playIcon.setAttribute('data-lucide', 'play');
            } else {
                audio.play();
                playIcon.setAttribute('data-lucide', 'pause');
            }
            isPlaying = !isPlaying;
            lucide.createIcons();
        });

        nextBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= tracks.length) nextIndex = 0; 
            playTrack(nextIndex);
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';
            }
        });

        audio.addEventListener('ended', () => {
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= tracks.length) {
                nextIndex = 0; 
                loadTrack(nextIndex); 
                isPlaying = false;
                playIcon.setAttribute('data-lucide', 'play');
                lucide.createIcons();
            } else {
                playTrack(nextIndex); 
            }
        });

        // Запуск
        fetchSongs();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
