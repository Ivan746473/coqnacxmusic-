<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Специальный тег для мобилок, чтобы не было зума -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMMu - Spotify Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Подключаем Telegram API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background: #121212;
            color: white;
            /* Отступ снизу равен высоте плеера + меню, чтобы текст не прятался под них */
            padding-bottom: 140px; 
        }
        .gradient-bg { 
            background: linear-gradient(180deg, #1e1e1e 0%, #121212 200px); 
            min-height: 100vh;
        }
        /* Жесткая фиксация меню в самом низу экрана */
        .fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 50;
        }
    </style>
</head>
<body>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <main class="gradient-bg px-4 pt-4">
        
        <!-- Шапка с фильтрами -->
        <div class="flex items-center gap-3 mb-6 mt-2">
            <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center font-bold text-black">C</div>
            <button class="bg-[#2a2a2a] px-4 py-1.5 rounded-full text-sm font-medium">Все</button>
            <button class="bg-[#2a2a2a] px-4 py-1.5 rounded-full text-sm font-medium">Музыка</button>
            <button class="bg-[#2a2a2a] px-4 py-1.5 rounded-full text-sm font-medium">Подкасты</button>
        </div>

        <!-- Сетка "Недавнее" -->
        <div class="grid grid-cols-2 gap-2 mb-8">
            <div class="bg-[#2a2a2a]/60 hover:bg-[#3a3a3a] rounded flex items-center gap-3 overflow-hidden transition">
                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=100&q=80" class="w-14 h-14 object-cover" alt="Cover">
                <span class="font-bold text-xs truncate pr-2">Любимые треки</span>
            </div>
            <div class="bg-[#2a2a2a]/60 hover:bg-[#3a3a3a] rounded flex items-center gap-3 overflow-hidden transition">
                <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=100&q=80" class="w-14 h-14 object-cover" alt="Cover">
                <span class="font-bold text-xs truncate pr-2">Toxis: Микс</span>
            </div>
            <div class="bg-[#2a2a2a]/60 hover:bg-[#3a3a3a] rounded flex items-center gap-3 overflow-hidden transition">
                <img src="https://images.unsplash.com/photo-1594623930572-300a3011d9d5?auto=format&fit=crop&w=100&q=80" class="w-14 h-14 object-cover" alt="Cover">
                <span class="font-bold text-xs truncate pr-2">ASTRO BOT OST</span>
            </div>
            <div class="bg-[#2a2a2a]/60 hover:bg-[#3a3a3a] rounded flex items-center gap-3 overflow-hidden transition">
                <div class="w-14 h-14 bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center">
                    <i data-lucide="music" class="w-6 h-6"></i>
                </div>
                <span class="font-bold text-xs truncate pr-2">Chery Tiggo 7L</span>
            </div>
        </div>

        <!-- Горизонтальный скролл "Твои лучшие миксы" -->
        <h2 class="text-xl font-bold mb-4">Твои лучшие миксы</h2>
        <div class="flex gap-4 overflow-x-auto pb-4">
            <div class="min-w-[140px] w-[140px]">
                <img src="https://files.catbox.moe/hx1x2n.jpg" class="w-full h-[140px] object-cover mb-2 rounded" alt="Mix">
                <p class="text-[#b3b3b3] text-xs line-clamp-2">BUSTER, OBLADAET</p>
            </div>
            <div class="min-w-[140px] w-[140px]">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=200&q=80" class="w-full h-[140px] object-cover mb-2 rounded" alt="Mix">
                <p class="text-[#b3b3b3] text-xs line-clamp-2">CS2 Hype, Phonk & Bass</p>
            </div>
            <div class="min-w-[140px] w-[140px]">
                <img src="https://images.unsplash.com/photo-1493225457124-a1a2a5f56468?auto=format&fit=crop&w=200&q=80" class="w-full h-[140px] object-cover mb-2 rounded-full" alt="Mix">
                <p class="text-[#b3b3b3] text-xs line-clamp-2 text-center mt-2">Miyagi & Эндшпиль</p>
            </div>
        </div>
        
        <!-- Дополнительный контент для проверки скролла -->
        <h2 class="text-xl font-bold mb-4 mt-6">Рекомендуемые станции</h2>
        <div class="flex gap-4 overflow-x-auto pb-8">
            <div class="min-w-[140px] w-[140px]">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=200&q=80" class="w-full h-[140px] object-cover mb-2 rounded" alt="Mix">
                <p class="text-white font-bold text-sm">Русский рэп</p>
                <p class="text-[#b3b3b3] text-xs">Радио</p>
            </div>
            <div class="min-w-[140px] w-[140px]">
                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=200&q=80" class="w-full h-[140px] object-cover mb-2 rounded" alt="Mix">
                <p class="text-white font-bold text-sm">Phonk Drift</p>
                <p class="text-[#b3b3b3] text-xs">Радио</p>
            </div>
        </div>

    </main>

    <!-- ФИКСИРОВАННЫЙ НИЗ (Плеер + Навигация) -->
    <div class="fixed-bottom">
        
        <!-- Мини-плеер -->
        <div class="px-2 pb-2">
            <div class="bg-[#5a1b26] rounded-md p-2 flex items-center justify-between shadow-lg relative overflow-hidden">
                <div class="absolute bottom-0 left-0 h-[2px] bg-white/20 w-full">
                    <div class="h-full bg-white w-[30%]" id="progressBar"></div>
                </div>

                <div class="flex items-center gap-3">
                    <img src="https://files.catbox.moe/hx1x2n.jpg" class="w-10 h-10 rounded shadow-md object-cover" alt="Track">
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-white">DISS OBLADAET</span>
                        <span class="text-[11px] text-[#b3b3b3]">BUSTER</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-3 mr-2">
                    <button><i data-lucide="monitor-speaker" class="w-5 h-5 text-[#b3b3b3]"></i></button>
                    <button><i data-lucide="heart" class="w-5 h-5 text-green-500 fill-green-500"></i></button>
                    <button id="playPauseBtn"><i data-lucide="play" class="w-6 h-6 fill-white" id="playIcon"></i></button>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <nav class="bg-gradient-to-t from-black via-black to-black/90 h-[65px] flex justify-around items-center px-2 pb-2 pt-1">
            <div class="flex flex-col items-center gap-1 cursor-pointer text-white">
                <i data-lucide="house" class="w-6 h-6 fill-white"></i>
                <span class="text-[10px]">Главная</span>
            </div>
            <div class="flex flex-col items-center gap-1 cursor-pointer text-[#b3b3b3] hover:text-white transition">
                <i data-lucide="search" class="w-6 h-6"></i>
                <span class="text-[10px]">Поиск</span>
            </div>
            <div class="flex flex-col items-center gap-1 cursor-pointer text-[#b3b3b3] hover:text-white transition">
                <i data-lucide="library" class="w-6 h-6"></i>
                <span class="text-[10px]">Моя медиатека</span>
            </div>
        </nav>
    </div>

    <!-- Логика работы плеера -->
    <script>
        // Инициализация Telegram Web App для раскрытия на весь экран
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
        }

        lucide.createIcons(); // Рисуем иконки

        const audio = new Audio('https://bbxrdhhhdpdthowvocny.supabase.co/storage/v1/object/public/music/tagged_BUSTER_-_BACKHAM_OBLADAET_DISS_80017120.mp3');
        const playBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const progressBar = document.getElementById('progressBar');
        
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playIcon.setAttribute('data-lucide', 'play');
            } else {
                audio.play();
                playIcon.setAttribute('data-lucide', 'pause');
            }
            lucide.createIcons();
            isPlaying = !isPlaying;
        });

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%';
        });

        audio.addEventListener('ended', () => {
            isPlaying = false;
            playIcon.setAttribute('data-lucide', 'play');
            lucide.createIcons();
            progressBar.style.width = '0%';
        });
    </script>
</body>
</html>
